name: deploy-production-blocked

# Intentionally non-deploying. GitHub Actions/GHCR cannot atomically promote three OCI refs and
# three signed client bundles as one transaction. release.yml therefore stops at signed run-scoped
# candidates. Keep this protected Environment gate red until the external transactional promoter
# described in RELEASE.md exists and independently verifies the signed release-set manifest.
on:
  workflow_dispatch:
    inputs:
      release_set:
        description: "Candidate release-set identifier (informational; production remains blocked)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  blocked:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Fail closed until atomic external promotion exists
        env:
          RELEASE_SET: ${{ inputs.release_set }}
        run: |
          echo "Production promotion is blocked for candidate: $RELEASE_SET" >&2
          echo "Required external gate: atomically publish all three verified OCI digests and all three signed client artifacts from one signed release-set manifest, then independently verify the committed result." >&2
          echo "GitHub branch/tag protection, Environment reviewers, and the external promoter are administrative controls and cannot be enforced by this repository alone." >&2
          exit 1
