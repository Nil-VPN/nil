name: ci

# Build, test, lint, and supply-chain gate on every push and PR. The pinned toolchain
# (rust-toolchain.toml → 1.96.0 + rustfmt/clippy) is installed automatically by rustup on the
# first cargo invocation, so the gate uses the exact compiler the project builds with.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Public claims are part of the security boundary (a VPN is not anonymity; be honest about
      # limits). These exact phrases describe superseded account, connect-time minting, one-hop
      # release, fallback, and validation claims. Keep this deliberately small and high-signal.
      - name: Public documentation claim-drift guard
        shell: bash
        run: |
          canonical=(
            README.md THREAT_MODEL.md RELEASE.md RETAINED_DATA.md
            deploy/IMAGES.md
            deploy/PROXY-PRIVACY.md
            deploy/monitoring/README.md client/trust/README.md
            crates/nil-android/README.md crates/nil-android/DEVICE_VERIFY.md
            crates/nil-apple/README.md crates/nil-apple/DEVICE_VERIFY.md
            crates/nil-apple/MACOS_DEVICE_VERIFY.md
            client/README.md client/mobile/README.md
            client/src/components.tsx client/src/screens.tsx
          )
          for file in "${canonical[@]}"; do
            test -s "$file" || { echo "missing canonical public document: $file"; exit 1; }
          done
          stale=(
            "single-hop attested MASQUE (closed alpha)"
            "These 7 words"
            "one-time recovery code"
            "connecting mints a token"
            "backs up the primary MASQUE rung"
            "unlinkability is **information-theoretic**"
            "Residual: none known at the alpha scope"
            "Per-OS runtime behaviour is verified"
            "closes the chain from reproducible source"
            "allowUnattested"
            "block_without_vpn"
          )
          for phrase in "${stale[@]}"; do
            if grep -Fini -- "$phrase" "${canonical[@]}"; then
              echo "stale public claim returned: $phrase"
              exit 1
            fi
          done

      - name: Public proxy privacy/config guard
        shell: bash
        run: bash deploy/verify-proxy-privacy.sh

      - name: Release workflow and Docker-context guard
        shell: bash
        run: bash deploy/verify-release-config.sh

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # System libraries the workspace build needs on Linux: the Tauri client (nil-client) pulls
      # glib/gtk/webkit2gtk-sys (need the -dev packages + pkg-config), and quiche/BoringSSL needs
      # cmake + clang. Without these the glib-sys/webkit2gtk-sys build scripts fail at pkg-config.
      - name: Install Linux build deps (Tauri + BoringSSL/quiche)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libglib2.0-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev \
            cmake clang pkg-config build-essential

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # The security-critical suites live behind off-by-default Cargo features, so the plain
  # `cargo test --workspace` in `check` never compiles — let alone runs — them. This job turns
  # each one on explicitly so the proofs that matter most actually execute on every push/PR:
  #   * attestation accept/reject  — nil-attest `synthetic` (the appraise_synthetic + SEV-SNP/TDX
  #     KAT suites: ACCEPT on a matching measurement, REJECT on measurement/nonce/TEE mismatch),
  #   * wstunnel round-trip        — nil-transport `wstunnel` (WireGuard over WebSocket-over-TLS,
  #     full glue path in-process), which transitively pulls `pqwg`/`masque`,
  #   * double-spend nullifier     — nil-coordinator `postgres` (single-use insert + the NoTls
  #     non-loopback refusal guard) and nil-portal `postgres` (one-token-per-payment PgStore),
  #   * synthetic RA-TLS datapath  — nil-node / nil-datapath / nil-cli `synthetic-attest`.
  # Features are applied per-crate (not `--workspace --features X`): each feature is defined on a
  # different member, so a workspace-wide flag would error on the crates that don't declare it.
  feature-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-feat-${{ hashFiles('**/Cargo.lock') }}

      # quiche/BoringSSL (pulled by masque → wstunnel/synthetic-attest) needs cmake + clang;
      # the rest are the standard build toolchain. No Tauri/webkit here — no client crate builds.
      - name: Install build deps (BoringSSL/quiche)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libssl-dev cmake clang pkg-config build-essential

      # Attestation accept/reject + measurement-binding KATs (the Docker harness's appraisal path).
      - name: Attestation suite (nil-attest synthetic)
        run: cargo test -p nil-attest --features synthetic --locked

      # WireGuard-over-WebSocket-over-TLS round-trip (transitively enables pqwg + masque).
      - name: Development fallback round-trips (nil-transport dev-fallbacks)
        run: cargo test -p nil-transport --features dev-fallbacks --locked

      # Network-aware selector: probe → fast/resistant rung ordering + step-down + the datapath
      # NW_SELECTOR wiring (transitively enables reality + wstunnel + pqwg + masque).
      - name: Selector (nil-transport + nil-datapath selector)
        run: |
          cargo test -p nil-transport --features selector --locked
          cargo build -p nil-datapath --features selector --locked

      # Fast-path perf gate: per-packet hotpath throughput + correctness + no-regression floor +
      # no-PII bench output (the baseline the Linux GSO/GRO follow-up will be measured against).
      - name: Fast-path perf gate (nil-transport fast-path)
        run: cargo test -p nil-transport --features fast-path --locked

      # Tier-2 Maybenot/DAITA defense driver (experimental, off by default): the driver engine + its
      # deterministic real-machine test must build and pass so the padding-action scheduling can't
      # bitrot. Live datapath wiring + the concrete defense-machine profile are a separate step.
      - name: DAITA driver (nil-transport daita)
        run: cargo test -p nil-transport --features daita --locked

      # Clustered double-spend nullifier: single-use insert + NoTls non-loopback refusal guard.
      - name: Coordinator nullifier (nil-coordinator postgres)
        run: cargo test -p nil-coordinator --features postgres --locked

      # One-token-per-payment durable store compiles and its tests run under the Postgres backend.
      - name: Portal store (nil-portal postgres)
        run: cargo test -p nil-portal --features postgres --locked

      # Card (Merchant-of-Record) webhook rail: HMAC verify, confirm/revoke idempotency, dual-rail
      # composite, and the no-PII WebhookEvent DTO tripwire.
      - name: Card payments (nil-portal card-payments)
        run: cargo test -p nil-portal --features card-payments --locked

      # HSM/KMS-backed issuer key (PKCS#11). The blind-sign round-trip needs a live PKCS#11 module
      # (SoftHSM) and runs via deploy/verify-hsm.sh; here we compile the feature + run the rest of the
      # portal suite (the HSM test skips cleanly without NW_TOKEN_HSM_MODULE) so it can't bitrot.
      - name: HSM issuer signer compiles (nil-portal hsm)
        run: cargo test -p nil-portal --features hsm --locked

      # Synthetic RA-TLS datapath wiring (node report + client/datapath appraisal acceptance).
      - name: Synthetic-attest datapath (node + datapath + cli)
        run: |
          cargo test -p nil-node --no-default-features --features synthetic-attest --locked
          cargo test -p nil-datapath --features synthetic-attest --locked
          cargo test -p nil-cli --features synthetic-attest --locked

      # The production hardware-attestation path (configfs-TSM) never RUNS in CI (needs a TEE), but
      # it must keep compiling so it can't bitrot, and the hw-attest production guards must build.
      - name: hw-attest compile-check (nil-node)
        run: cargo build -p nil-node --features hw-attest --locked

      # Dev/staging data-plane diagnostics (`dev-trace`): build + test the node, client, transport,
      # and datapath with it on, so the PII-free counters can't bitrot.
      - name: dev-trace diagnostics (node + cli + transport + datapath)
        run: |
          cargo test -p nil-node --no-default-features --features synthetic-attest,dev-trace --locked
          cargo test -p nil-cli --features synthetic-attest,dev-trace --locked
          cargo test -p nil-transport --features masque,pqwg,dev-trace --locked
          cargo test -p nil-datapath --features synthetic-attest,dev-trace --locked

      # PROD-SAFETY TRIPWIRE: `dev-trace` must NEVER reach a production node. (1) compiling it with
      # `hw-attest` must FAIL (the `attest.rs` compile_error); (2) the production Dockerfiles must not
      # reference `dev-trace`. Both are asserted here so a prod build can never ship the diagnostics.
      - name: dev-trace excluded from production
        run: |
          if cargo build -p nil-node --features hw-attest,dev-trace --locked 2>/dev/null; then
            echo "FAIL: nil-node compiled with hw-attest + dev-trace (the compile_error guard is missing)"; exit 1
          fi
          echo "OK: hw-attest + dev-trace is a compile_error"
          if grep -n "dev-trace" deploy/Dockerfile.node deploy/Dockerfile.repro; then
            echo "FAIL: a production Dockerfile references dev-trace"; exit 1
          fi
          echo "OK: production Dockerfiles do not reference dev-trace"

      # P0.6 release boundary: optimized production artifacts must compile in their safe default
      # posture, while every explicit development capability is rejected by a compile-time guard.
      - name: Release posture compile guards
        run: |
          cargo check --release -p nil-node --locked
          cargo check --release -p nil-cli --locked
          cargo check --release -p nil-datapath --features launch --locked
          if cargo check --release -p nil-node --no-default-features --features synthetic-attest --locked 2>/dev/null; then
            echo "FAIL: release nil-node accepted synthetic-attest"; exit 1
          fi
          if cargo check --release -p nil-cli --features dev-fallbacks --locked 2>/dev/null; then
            echo "FAIL: release nil-cli accepted dev-fallbacks"; exit 1
          fi
          if cargo check --release -p nil-datapath --features dev-trace --locked 2>/dev/null; then
            echo "FAIL: release nil-datapath accepted dev-trace"; exit 1
          fi
          echo "OK: release builds reject synthetic attestation, alternate fallbacks, and dev tracing"

  # The desktop client's React frontend: type-check (tsc), bundle (vite), and the vitest unit
  # tests (fail-closed token gate, buy/settings flows). The Rust side is covered by `check`.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.33.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.1
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install
        run: pnpm --dir client install --frozen-lockfile
      - name: Advisory gate (all frontend build and runtime dependencies)
        run: pnpm --dir client audit --audit-level high
      - name: License policy gate
        run: bash deploy/verify-frontend-licenses.sh
      - name: Build (tsc + vite)
        run: pnpm --dir client build
      - name: Test (vitest)
        run: pnpm --dir client test

  # Compile-check the Windows datapath (netsh/WFP routing + kill-switch in nil-datapath/windows.rs)
  # on a real MSVC toolchain — it can't build on the macOS/Linux dev hosts. nil-datapath's base
  # (no `launch`) pulls no quiche, so this needs no BoringSSL/nasm. Runtime kill-switch behaviour
  # still requires a Windows VM (tracked separately).
  windows-check:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Clippy (windows datapath)
        run: cargo clippy -p nil-datapath --all-targets --locked -- -D warnings

  # Compile-check the Apple engine (nil-apple) for macOS (arm64+x86_64) AND iOS (device + simulator)
  # and package the NilApple.xcframework — catches Apple-target bitrot (BoringSSL/quiche for the iOS
  # sysroot, the cbindgen C-ABI) without a device. The runtime datapath (NEPacketTunnelProvider on a
  # device / the macOS system extension) still needs hardware + signing (tracked separately).
  apple-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build the Apple engine xcframework (macOS + iOS slices)
        run: NIL_APPLE_WITH_IOS=1 bash client/apple/build-engine.sh debug

  # Build the macOS System Extension (NEPacketTunnelProvider) UNSIGNED from the XcodeGen spec —
  # catches SE build-graph bitrot (the .swift provider + bridging header, the linked xcframework,
  # the project.yml) without any signing/Developer account/device. Signing + activation + runtime
  # remain on-device handoffs (crates/nil-apple/MACOS_DEVICE_VERIFY.md).
  macos-se-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build the macOS system extension (unsigned)
        run: bash deploy/verify-macos-se-build.sh

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Licenses, advisories, bans, sources
        run: |
          cargo install cargo-deny --version 0.19.9 --locked
          # Fail closed: every lint (including duplicate-version and wildcard bans, which are now
          # "deny" in deny.toml after the 2026-07-11 duplicate review) is fatal. Warnings are fatal.
          cargo deny check -D warnings

      - name: Rust CVE coverage (cargo-audit / RUSTSEC DB)
        run: |
          cargo install cargo-audit --version 0.21.1 --locked
          # `cargo audit` consults the RustSec advisory database independently of cargo-deny's
          # embedded feed, and flags known-vulnerable crate versions. The ignored IDs in deny.toml
          # (RUSTSEC-2023-0071, RUSTSEC-2026-0194/0195) are documented, unreachable-in-prod debt; we
          # honor the same review here so the two gates stay consistent instead of diverging.
          cargo audit --deny warnings \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

      - name: Source-replacement supply-chain guard
        run: |
          bash deploy/verify-no-source-replace.sh

      - name: Workspace SBOM (CycloneDX; Rust and lockfile-discovered packages)
        uses: anchore/sbom-action@9246b90769f852b3a8921f330c59e0b3f439d6e9 # v0.20.6
        with:
          path: .
          format: cyclonedx-json
          output-file: workspace.cdx.json
          upload-artifact: false

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: workspace.cdx.json
          if-no-files-found: error
