name: client-build

# Build the Tauri desktop client for all three platforms and attach the produced
# artifacts plus a CycloneDX SBOM of the client npm dependency tree to every run.
# The exact Node (22.17.1) and pnpm (10.33.0) versions are pinned as required by
# RELEASE.md so release/repro builds stay deterministic.

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: client-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Linux build deps (Tauri webkit2gtk + glib/gtk)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libglib2.0-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev \
            cmake clang pkg-config build-essential

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.33.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.1
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir client install --frozen-lockfile

      - name: Build frontend (tsc + vite)
        run: pnpm --dir client build

      - name: Build Tauri client (Linux)
        run: pnpm --dir client tauri build

      - name: Client npm SBOM (CycloneDX)
        uses: anchore/sbom-action@9246b90769f852b3a8921f330c59e0b3f439d6e9 # v0.20.6
        with:
          path: client
          format: cyclonedx-json
          output-file: client-linux-sbom.cdx.json
          upload-artifact: false

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nil-client-linux
          path: |
            client/src-tauri/target/release/bundle/deb/*.deb
            client/src-tauri/target/release/bundle/rpm/*.rpm
            client/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload Linux SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nil-client-linux-sbom
          path: client-linux-sbom.cdx.json
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.33.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.1
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir client install --frozen-lockfile

      - name: Build frontend (tsc + vite)
        run: pnpm --dir client build

      - name: Build Tauri client (macOS)
        run: pnpm --dir client tauri build

      - name: Client npm SBOM (CycloneDX)
        uses: anchore/sbom-action@9246b90769f852b3a8921f330c59e0b3f439d6e9 # v0.20.6
        with:
          path: client
          format: cyclonedx-json
          output-file: client-macos-sbom.cdx.json
          upload-artifact: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nil-client-macos
          path: |
            client/src-tauri/target/release/bundle/macos/*.app
            client/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nil-client-macos-sbom
          path: client-macos-sbom.cdx.json
          if-no-files-found: error

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.33.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.17.1
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir client install --frozen-lockfile

      - name: Build frontend (tsc + vite)
        run: pnpm --dir client build

      - name: Build Tauri client (Windows)
        run: pnpm --dir client tauri build

      - name: Client npm SBOM (CycloneDX)
        uses: anchore/sbom-action@9246b90769f852b3a8921f330c59e0b3f439d6e9 # v0.20.6
        with:
          path: client
          format: cyclonedx-json
          output-file: client-windows-sbom.cdx.json
          upload-artifact: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nil-client-windows
          path: |
            client/src-tauri/target/release/bundle/msi/*.msi
            client/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nil-client-windows-sbom
          path: client-windows-sbom.cdx.json
          if-no-files-found: error
