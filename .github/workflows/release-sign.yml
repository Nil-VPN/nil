name: release-client-candidates

# Reusable release stage. Unsigned desktop bundles are built in jobs with no signing secrets and
# checkout credentials disabled. Protected signing jobs download immutable runner artifacts and
# execute only platform signing/notarization tools; they never check out or execute repository code.
# Signed candidates remain Actions artifacts until the external atomic-promotion gate is satisfied.
on:
  workflow_call:
    secrets:
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_SIGNING_IDENTITY:
        required: false
      APPLE_API_KEY_P8:
        required: false
      APPLE_API_ISSUER:
        required: false
      APPLE_API_KEY:
        required: false
      WINDOWS_CERTIFICATE:
        required: false
      WINDOWS_CERTIFICATE_PASSWORD:
        required: false
      GPG_PRIVATE_KEY:
        required: false
      GPG_PASSPHRASE:
        required: false
    outputs:
      client_manifest_sha256:
        description: SHA-256 of the keyless-signed client candidate manifest
        value: ${{ jobs.client-manifest.outputs.client_manifest_sha256 }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22.17.1"
  PNPM_VERSION: "10.33.0"

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-client-${{ hashFiles('Cargo.lock') }}
      - name: Install and build unsigned universal macOS bundles
        env:
          NIL_TRUST_BUNDLE_JSON: ${{ vars.NIL_TRUST_BUNDLE_JSON }}
        run: |
          set -euo pipefail
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          pnpm --dir client install --frozen-lockfile
          pnpm --dir client tauri build --target universal-apple-darwin
          tar -czf unsigned-macos.tar.gz \
            -C client/src-tauri/target/universal-apple-darwin/release/bundle .
          shasum -a 256 unsigned-macos.tar.gz > unsigned-macos.tar.gz.SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-client-macos-${{ github.run_attempt }}
          path: |
            unsigned-macos.tar.gz
            unsigned-macos.tar.gz.SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-client-${{ hashFiles('Cargo.lock') }}
      - name: Install and build unsigned Windows bundles
        shell: pwsh
        env:
          NIL_TRUST_BUNDLE_JSON: ${{ vars.NIL_TRUST_BUNDLE_JSON }}
        run: |
          pnpm --dir client install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pnpm --dir client tauri build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          tar -a -c -f unsigned-windows.zip -C client/src-tauri/target/release/bundle .
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $hash = (Get-FileHash unsigned-windows.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  unsigned-windows.zip" | Set-Content -NoNewline unsigned-windows.zip.SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-client-windows-${{ github.run_attempt }}
          path: |
            unsigned-windows.zip
            unsigned-windows.zip.SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-client-${{ hashFiles('Cargo.lock') }}
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libglib2.0-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev \
            cmake clang pkg-config build-essential
      - name: Install, audit, and build unsigned Linux bundles
        env:
          NIL_TRUST_BUNDLE_JSON: ${{ vars.NIL_TRUST_BUNDLE_JSON }}
        run: |
          set -euo pipefail
          pnpm --dir client install --frozen-lockfile
          pnpm --dir client audit --audit-level high
          bash deploy/verify-frontend-licenses.sh
          pnpm --dir client tauri build
          tar -czf unsigned-linux.tar.gz -C client/src-tauri/target/release/bundle .
          sha256sum unsigned-linux.tar.gz > unsigned-linux.tar.gz.SHA256SUMS
      - name: Combined Rust/npm client SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.20.6
        with:
          # Root scanning includes the workspace Cargo.lock and client/pnpm-lock.yaml; limiting the
          # path to client/ would silently omit the Rust lockfile shared by nil-client.
          path: .
          format: cyclonedx-json
          output-file: client.cdx.json
          upload-artifact: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-client-linux-${{ github.run_attempt }}
          path: |
            unsigned-linux.tar.gz
            unsigned-linux.tar.gz.SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-combined-sbom-${{ github.run_attempt }}
          path: client.cdx.json
          if-no-files-found: error
          retention-days: 30

  sign-macos:
    needs: build-macos
    runs-on: macos-14
    environment: release-signing-macos
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unsigned-client-macos-${{ github.run_attempt }}
      - name: Validate macOS archive paths and entry types before exposing secrets
        run: |
          set -euo pipefail
          grep -Eq '^[0-9a-f]{64}  unsigned-macos\.tar\.gz$' unsigned-macos.tar.gz.SHA256SUMS
          shasum -a 256 -c unsigned-macos.tar.gz.SHA256SUMS
          python3 - <<'PY'
          import pathlib
          import tarfile
          import unicodedata

          seen = set()
          count = 0
          total = 0
          with tarfile.open("unsigned-macos.tar.gz", "r:gz") as archive:
              for member in archive.getmembers():
                  count += 1
                  if count > 50_000:
                      raise SystemExit("archive has too many entries")
                  raw = member.name
                  if (not raw or len(raw.encode("utf-8")) > 4096 or "\\" in raw or
                          raw.startswith("/") or any(ord(ch) < 32 for ch in raw)):
                      raise SystemExit(f"unsafe archive path: {raw!r}")
                  while raw.startswith("./"):
                      raw = raw[2:]
                  if raw in ("", "."):
                      if not member.isdir():
                          raise SystemExit("archive root entry is not a directory")
                      continue
                  path = pathlib.PurePosixPath(raw)
                  if any(part in ("", ".", "..") for part in path.parts):
                      raise SystemExit(f"unsafe archive component: {member.name!r}")
                  if any(len(part.encode("utf-8")) > 255 for part in path.parts):
                      raise SystemExit(f"oversized archive component: {member.name!r}")
                  key = unicodedata.normalize("NFC", raw).casefold()
                  if key in seen:
                      raise SystemExit(f"duplicate/case-colliding archive path: {raw!r}")
                  seen.add(key)
                  if member.issym() or member.islnk() or not (member.isfile() or member.isdir()):
                      raise SystemExit(f"links/special entries are forbidden: {raw!r}")
                  if member.mode & 0o7000:
                      raise SystemExit(f"setid/sticky archive mode is forbidden: {raw!r}")
                  if member.size > 4 * 1024**3:
                      raise SystemExit(f"archive member too large: {raw!r}")
                  total += member.size
                  if total > 8 * 1024**3:
                      raise SystemExit("archive uncompressed size exceeds limit")
          PY
          mkdir unsigned
          tar -xzf unsigned-macos.tar.gz -C unsigned
          if [ -n "$(find unsigned -type l -print -quit)" ]; then
            echo "extracted macOS tree contains a symlink" >&2; exit 1
          fi
          if [ -n "$(find unsigned -type f -links +1 -print -quit)" ]; then
            echo "extracted macOS tree contains a hardlink" >&2; exit 1
          fi
          if [ -n "$(find unsigned ! -type f ! -type d -print -quit)" ]; then
            echo "extracted macOS tree contains a special entry" >&2; exit 1
          fi
      - name: Verify, sign, notarize, and staple the prebuilt app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          expected="$(awk '{print $1}' unsigned-macos.tar.gz.SHA256SUMS)"
          actual="$(shasum -a 256 unsigned-macos.tar.gz | awk '{print $1}')"
          [ "$actual" = "$expected" ] || { echo "unsigned macOS artifact hash mismatch" >&2; exit 1; }
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_API_KEY_P8 APPLE_API_ISSUER APPLE_API_KEY; do
            [ -n "${!name:-}" ] || { echo "missing protected signing secret: $name" >&2; exit 1; }
          done
          keychain="$RUNNER_TEMP/nil-release.keychain-db"
          p12="$RUNNER_TEMP/codesign.p12"
          api_key="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          password="$(uuidgen)"
          cleanup() {
            security delete-keychain "$keychain" >/dev/null 2>&1 || true
            rm -f "$p12" "$api_key"
          }
          trap cleanup EXIT
          printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$p12"
          printf '%s' "$APPLE_API_KEY_P8" > "$api_key"
          security create-keychain -p "$password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$password" "$keychain"
          security import "$p12" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$password" "$keychain"
          security list-keychains -d user -s "$keychain"
          mkdir signed
          app="$(find unsigned -type d -name '*.app' -print -quit)"
          [ -n "$app" ] || { echo "unsigned macOS artifact contains no .app" >&2; exit 1; }
          codesign --force --deep --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          ditto -c -k --keepParent "$app" "$RUNNER_TEMP/notarize-app.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize-app.zip" \
            --key "$api_key" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple "$app"
          cp -R "$app" signed/
          hdiutil create -volname "NIL VPN" -srcfolder "$app" -ov -format UDZO signed/NIL-VPN.dmg
          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" signed/NIL-VPN.dmg
          xcrun notarytool submit signed/NIL-VPN.dmg \
            --key "$api_key" --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" --wait
          xcrun stapler staple signed/NIL-VPN.dmg
          tar -czf signed-client-macos.tar.gz -C signed .
          shasum -a 256 signed-client-macos.tar.gz > signed-client-macos.tar.gz.SHA256SUMS
      - name: Attest signed macOS candidate provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: signed-client-macos.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-client-macos-${{ github.run_attempt }}
          path: |
            signed-client-macos.tar.gz
            signed-client-macos.tar.gz.SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  sign-windows:
    needs: build-windows
    runs-on: windows-2022
    environment: release-signing-windows
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unsigned-client-windows-${{ github.run_attempt }}
      - name: Validate Windows archive paths and entry types before exposing secrets
        shell: pwsh
        run: |
          $expected = (Get-Content unsigned-windows.zip.SHA256SUMS).Split(' ')[0]
          $actual = (Get-FileHash unsigned-windows.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { Write-Error "unsigned Windows artifact hash mismatch"; exit 1 }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $seen = [Collections.Generic.HashSet[string]]::new([StringComparer]::OrdinalIgnoreCase)
          $count = 0
          [long]$total = 0
          $zip = [IO.Compression.ZipFile]::OpenRead((Resolve-Path unsigned-windows.zip))
          try {
            foreach ($entry in $zip.Entries) {
              $count++
              if ($count -gt 50000) { throw "archive has too many entries" }
              $raw = $entry.FullName.Replace('\', '/')
              if ([string]::IsNullOrWhiteSpace($raw) -or $raw.Length -gt 4096 -or $raw.StartsWith('/') -or
                  $raw -match '^[A-Za-z]:' -or $raw.Contains(':') -or
                  $raw -match '[\x00-\x1F]') {
                throw "unsafe archive path: $raw"
              }
              $isDirectory = $raw.EndsWith('/')
              while ($raw.StartsWith('./')) { $raw = $raw.Substring(2) }
              $trimmed = $raw.TrimEnd('/')
              if ([string]::IsNullOrEmpty($trimmed)) {
                if (-not $isDirectory) { throw "archive root entry is not a directory" }
                continue
              }
              $parts = $trimmed.Split('/')
              foreach ($part in $parts) {
                if ([string]::IsNullOrEmpty($part) -or $part -eq '.' -or $part -eq '..' -or
                    $part.Length -gt 255 -or $part.EndsWith('.') -or $part.EndsWith(' ')) {
                  throw "unsafe archive component: $raw"
                }
                $stem = ($part -split '\.')[0]
                if ($stem -match '^(?i:CON|PRN|AUX|NUL|COM[1-9]|LPT[1-9])$') {
                  throw "reserved Windows archive component: $raw"
                }
              }
              if (-not $seen.Add($trimmed)) { throw "duplicate/case-colliding archive path: $raw" }
              $unixType = (($entry.ExternalAttributes -shr 16) -band 0xF000)
              if ($unixType -eq 0xA000 -or ($unixType -ne 0 -and $unixType -ne 0x8000 -and $unixType -ne 0x4000)) {
                throw "links/special entries are forbidden: $raw"
              }
              if (((($entry.ExternalAttributes -shr 16) -band 0x0E00)) -ne 0) {
                throw "setid/sticky archive mode is forbidden: $raw"
              }
              if ($entry.Length -gt 4GB) { throw "archive member too large: $raw" }
              $total += $entry.Length
              if ($total -gt 8GB) { throw "archive uncompressed size exceeds limit" }
              if ($isDirectory -and $entry.Length -ne 0) { throw "directory entry has data: $raw" }
            }
          } finally {
            $zip.Dispose()
          }
          New-Item -ItemType Directory -Path unsigned | Out-Null
          [IO.Compression.ZipFile]::ExtractToDirectory(
            (Resolve-Path unsigned-windows.zip), (Resolve-Path unsigned))
          $root = ([IO.Path]::GetFullPath((Resolve-Path unsigned).Path)).TrimEnd('\') + '\'
          foreach ($item in Get-ChildItem unsigned -Force -Recurse) {
            $full = [IO.Path]::GetFullPath($item.FullName)
            if (-not $full.StartsWith($root, [StringComparison]::OrdinalIgnoreCase)) {
              throw "extracted path escaped validation root: $full"
            }
            if (($item.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
              throw "extracted Windows tree contains a reparse point: $full"
            }
          }
      - name: Verify and Authenticode-sign prebuilt bundles
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $expected = (Get-Content unsigned-windows.zip.SHA256SUMS).Split(' ')[0]
          $actual = (Get-FileHash unsigned-windows.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { Write-Error "unsigned Windows artifact hash mismatch"; exit 1 }
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) { Write-Error "missing protected Windows certificate"; exit 1 }
          $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          try {
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
            $signtool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
              Where-Object { $_.FullName -match "x64" } | Select-Object -First 1 -ExpandProperty FullName
            if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }
            $targets = Get-ChildItem unsigned -Recurse -Include *.msi,*.exe
            if (-not $targets) { Write-Error "no Windows installers in unsigned artifact"; exit 1 }
            foreach ($file in $targets) {
              & $signtool sign /f $pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 `
                /tr "http://timestamp.digicert.com" /td SHA256 /v $file.FullName
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              & $signtool verify /pa /v $file.FullName
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
            tar -a -c -f signed-client-windows.zip -C unsigned .
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $hash = (Get-FileHash signed-client-windows.zip -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  signed-client-windows.zip" | Set-Content -NoNewline signed-client-windows.zip.SHA256SUMS
          } finally {
            Remove-Item $pfx -Force -ErrorAction SilentlyContinue
          }
      - name: Attest signed Windows candidate provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: signed-client-windows.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-client-windows-${{ github.run_attempt }}
          path: |
            signed-client-windows.zip
            signed-client-windows.zip.SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  sign-linux:
    needs: build-linux
    runs-on: ubuntu-22.04
    environment: release-signing-linux
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unsigned-client-linux-${{ github.run_attempt }}
      - name: Validate Linux archive paths and entry types before exposing secrets
        run: |
          set -euo pipefail
          grep -Eq '^[0-9a-f]{64}  unsigned-linux\.tar\.gz$' unsigned-linux.tar.gz.SHA256SUMS
          sha256sum --check unsigned-linux.tar.gz.SHA256SUMS
          python3 - <<'PY'
          import pathlib
          import tarfile
          import unicodedata

          seen = set()
          count = 0
          total = 0
          with tarfile.open("unsigned-linux.tar.gz", "r:gz") as archive:
              for member in archive.getmembers():
                  count += 1
                  if count > 50_000:
                      raise SystemExit("archive has too many entries")
                  raw = member.name
                  if (not raw or len(raw.encode("utf-8")) > 4096 or "\\" in raw or
                          raw.startswith("/") or any(ord(ch) < 32 for ch in raw)):
                      raise SystemExit(f"unsafe archive path: {raw!r}")
                  while raw.startswith("./"):
                      raw = raw[2:]
                  if raw in ("", "."):
                      if not member.isdir():
                          raise SystemExit("archive root entry is not a directory")
                      continue
                  path = pathlib.PurePosixPath(raw)
                  if any(part in ("", ".", "..") for part in path.parts):
                      raise SystemExit(f"unsafe archive component: {member.name!r}")
                  if any(len(part.encode("utf-8")) > 255 for part in path.parts):
                      raise SystemExit(f"oversized archive component: {member.name!r}")
                  key = unicodedata.normalize("NFC", raw).casefold()
                  if key in seen:
                      raise SystemExit(f"duplicate/case-colliding archive path: {raw!r}")
                  seen.add(key)
                  if member.issym() or member.islnk() or not (member.isfile() or member.isdir()):
                      raise SystemExit(f"links/special entries are forbidden: {raw!r}")
                  if member.mode & 0o7000:
                      raise SystemExit(f"setid/sticky archive mode is forbidden: {raw!r}")
                  if member.size > 4 * 1024**3:
                      raise SystemExit(f"archive member too large: {raw!r}")
                  total += member.size
                  if total > 8 * 1024**3:
                      raise SystemExit("archive uncompressed size exceeds limit")
          PY
          mkdir unsigned
          tar -xzf unsigned-linux.tar.gz -C unsigned
          if [ -n "$(find unsigned -type l -print -quit)" ]; then
            echo "extracted Linux tree contains a symlink" >&2; exit 1
          fi
          if [ -n "$(find unsigned -type f -links +1 -print -quit)" ]; then
            echo "extracted Linux tree contains a hardlink" >&2; exit 1
          fi
          if [ -n "$(find unsigned ! -type f ! -type d -print -quit)" ]; then
            echo "extracted Linux tree contains a special entry" >&2; exit 1
          fi
      - name: Verify and GPG-sign prebuilt bundles
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          expected="$(awk '{print $1}' unsigned-linux.tar.gz.SHA256SUMS)"
          actual="$(sha256sum unsigned-linux.tar.gz | awk '{print $1}')"
          [ "$actual" = "$expected" ] || { echo "unsigned Linux artifact hash mismatch" >&2; exit 1; }
          [ -n "${GPG_PRIVATE_KEY:-}" ] || { echo "missing protected GPG key" >&2; exit 1; }
          export GNUPGHOME="$(mktemp -d)"
          trap 'rm -rf "$GNUPGHOME"' EXIT
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          mapfile -t targets < <(find unsigned -type f \( -name '*.deb' -o -name '*.AppImage' \))
          [ "${#targets[@]}" -gt 0 ] || { echo "no Linux bundles in unsigned artifact" >&2; exit 1; }
          for file in "${targets[@]}"; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign --output "${file}.asc" "$file"
            gpg --batch --verify "${file}.asc" "$file"
          done
          tar -czf signed-client-linux.tar.gz -C unsigned .
          sha256sum signed-client-linux.tar.gz > signed-client-linux.tar.gz.SHA256SUMS
      - name: Attest signed Linux candidate provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: signed-client-linux.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-client-linux-${{ github.run_attempt }}
          path: |
            signed-client-linux.tar.gz
            signed-client-linux.tar.gz.SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  client-manifest:
    needs: [sign-macos, sign-windows, sign-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      client_manifest_sha256: ${{ steps.manifest.outputs.sha256 }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: signed-client-*-${{ github.run_attempt }}
          path: signed-clients
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-combined-sbom-${{ github.run_attempt }}
          path: client-manifest
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.4.1
      - name: Build and keyless-sign the complete client candidate manifest
        id: manifest
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          mkdir -p client-manifest
          for platform in macos windows linux; do
            platform_dir="signed-clients/signed-client-${platform}-${GITHUB_RUN_ATTEMPT}"
            checksum="$(find "$platform_dir" -name '*.SHA256SUMS' -type f -print -quit)"
            [ -s "$checksum" ] || { echo "missing $platform checksum" >&2; exit 1; }
            archive="$(find "$platform_dir" -type f ! -name '*.SHA256SUMS' -print -quit)"
            [ -s "$archive" ] || { echo "missing $platform signed archive" >&2; exit 1; }
            expected="$(awk '{print $1}' "$checksum")"
            actual="$(sha256sum "$archive" | awk '{print $1}')"
            [ "$actual" = "$expected" ] || { echo "$platform signed archive hash mismatch" >&2; exit 1; }
            cp "$checksum" "client-manifest/${platform}.SHA256SUMS"
          done
          macos="$(awk '{print $1}' client-manifest/macos.SHA256SUMS)"
          windows="$(awk '{print $1}' client-manifest/windows.SHA256SUMS)"
          linux="$(awk '{print $1}' client-manifest/linux.SHA256SUMS)"
          sbom="$(sha256sum client-manifest/client.cdx.json | awk '{print $1}')"
          jq -n --arg source_sha "$GITHUB_SHA" --arg github_run_id "$GITHUB_RUN_ID" \
            --argjson github_run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg macos "$macos" --arg windows "$windows" \
            --arg linux "$linux" --arg sbom "$sbom" \
            '{schema:"https://nilvpn.net/release-client-set/v1",source_sha:$source_sha,github_run_id:$github_run_id,github_run_attempt:$github_run_attempt,node:"22.17.1",pnpm:"10.33.0",artifacts:{macos_sha256:$macos,windows_sha256:$windows,linux_sha256:$linux},combined_sbom_sha256:$sbom,published_release:false}' \
            > client-manifest/clients.json
          sha="$(sha256sum client-manifest/clients.json | awk '{print $1}')"
          printf '%s  %s\n' "$sha" clients.json > client-manifest/SHA256SUMS
          cosign sign-blob --yes --bundle client-manifest/clients.sigstore.json \
            client-manifest/clients.json
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-client-manifest-${{ github.run_attempt }}
          path: client-manifest
          if-no-files-found: error
          retention-days: 30
