version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      workflow-actions:
        patterns: ["*"]
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    # Keep patch and minor bumps grouped so a single PR updates the whole Rust graph; major
    # version jumps are left ungrouped to force deliberate review per crate.
    open-pull-requests-limit: 10
    target-branch: "convoy/nil-vpn-production-readiness/abc408e6/head"
    groups:
      rust-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    target-branch: "convoy/nil-vpn-production-readiness/abc408e6/head"
    groups:
      frontend-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
