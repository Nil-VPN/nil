# Host-safe FULL-STACK end-to-end verification: the whole pipeline on one private bridge —
# nil-portal (blind-signs a Privacy Pass token) → nil-coordinator (verifies the token,
# enforces single-use, selects a trust-split path) → the datapath (brings up the 3-hop attested
# MASQUE onion using the granted path) → real traffic. deploy/verify-e2e.sh drives it. Nothing
# touches the host network.
#
# The Portal and Coordinator are deliberately SEPARATE services (Pillar 4: issuer ≠ verifier).
# The Coordinator runs as `sleep infinity` and the script starts nil-coordinator via exec, once
# it has read the Portal's issuer public key from the Portal log and written the node registry.
# The committed node configuration contains only the RFC 8032 test PUBLIC key; verify-e2e.sh
# injects the matching test seed into the Coordinator. These public test vectors are E2E-only.
# All three planes share the image (deploy/Dockerfile.e2e).

x-node-base: &node-base
  build:
    context: ..
    dockerfile: deploy/Dockerfile.e2e
  # Generate a per-container stable key before node startup. The harness reads only the public
  # SPKI digest into its runtime registry; the private key never leaves the node container.
  command: ["sh", "-ec", "nil-node tls-keygen /tmp/node-tls-key.pem > /tmp/tls-meta; exec env NW_NODE_TLS_KEY_FILE=/tmp/node-tls-key.pem nil-node"]
  cap_add: ["NET_ADMIN"]
  devices: ["/dev/net/tun"]
  sysctls:
    - net.ipv4.ip_forward=1

services:
  # Business plane: mints anonymous Privacy Pass tokens. The real flow is checkout (server-minted
  # reference) → pay → blind-issue; NW_MOCK_PAID_ALL stands in for the "paid" step so the harness
  # can confirm the random checkout reference without a live monerod (dev/integration only). The
  # front-running guard still requires a minted reference, so the composed checkout→issue path is
  # what gets exercised.
  portal:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.e2e
    command: ["nil-portal"]
    environment:
      - NW_PORTAL_ADDR=0.0.0.0:8080
      - NW_ALLOW_DEV_FALLBACKS=1
      - NW_MOCK_PAID_ALL=1
      - RUST_LOG=info,nil_portal=debug
    networks:
      nilnet:
        ipv4_address: 10.82.0.5

  # Control plane: verifies tokens (Portal's PUBLIC key only), keeps the permanent nullifier plus
  # encrypted grant-lifetime retry result, and selects a diverse path. Started via exec.
  coordinator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.e2e
    command: ["sleep", "infinity"]
    environment:
      - RUST_LOG=info,nil_coordinator=debug
    depends_on: [portal]
    networks:
      nilnet:
        ipv4_address: 10.82.0.6

  entry:
    <<: *node-base
    environment:
      - NW_NODE_BIND=0.0.0.0:443
      - NW_NODE_ID=entry
      - NW_NODE_EGRESS=eth0
      - NW_NODE_ROLE=entry
      - NW_NODE_MEASUREMENT=000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f202122232425262728292a2b2c2d2e2f
      - NW_NODE_TEE=sev-snp
      - NW_GRANT_REALM=nil-e2e
      - NW_GRANT_VERIFY_KEYS=d75a980182b10ab7d54bfed3c964073a0ee172f3daa62325af021a68f707511a
      - RUST_LOG=info,nil_node=debug
    networks:
      nilnet:
        ipv4_address: 10.82.0.11

  middle:
    <<: *node-base
    environment:
      - NW_NODE_BIND=0.0.0.0:443
      - NW_NODE_ID=middle
      - NW_NODE_EGRESS=eth0
      - NW_NODE_ROLE=middle
      - NW_NODE_MEASUREMENT=000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f202122232425262728292a2b2c2d2e2f
      - NW_NODE_TEE=sev-snp
      - NW_GRANT_REALM=nil-e2e
      - NW_GRANT_VERIFY_KEYS=d75a980182b10ab7d54bfed3c964073a0ee172f3daa62325af021a68f707511a
      - RUST_LOG=info,nil_node=debug
    networks:
      nilnet:
        ipv4_address: 10.82.0.12

  exit:
    <<: *node-base
    environment:
      - NW_NODE_BIND=0.0.0.0:443
      - NW_NODE_ID=exit
      - NW_NODE_EGRESS=eth0
      - NW_NODE_ROLE=exit
      - NW_NODE_MEASUREMENT=000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f202122232425262728292a2b2c2d2e2f
      - NW_NODE_TEE=sev-snp
      - NW_GRANT_REALM=nil-e2e
      - NW_GRANT_VERIFY_KEYS=d75a980182b10ab7d54bfed3c964073a0ee172f3daa62325af021a68f707511a
      - RUST_LOG=info,nil_node=debug
    networks:
      nilnet:
        ipv4_address: 10.82.0.13

  client:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.e2e
    command: ["sleep", "infinity"]
    environment:
      - RUST_LOG=info,nil_datapath=debug,nil_transport=debug
      # The Portal/Coordinator are reached over plaintext http on this trusted private bridge;
      # opt into an insecure control plane (dev/test only — production requires https/loopback).
      - NW_INSECURE_CONTROL_PLANE=1
    cap_add: ["NET_ADMIN"]
    devices: ["/dev/net/tun"]
    depends_on: [portal, coordinator, entry, middle, exit]
    networks:
      nilnet:
        ipv4_address: 10.82.0.30

networks:
  nilnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.82.0.0/24
