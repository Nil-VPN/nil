# ===========================================================================
# nil-coordinator (Control plane) — production stack
# ===========================================================================
# SECURITY STATUS: production remains NO-GO. This reviewed example intentionally has no mutable
# Caddy default. Set CADDY_IMAGE to the exact approved @sha256 reference recorded in a future signed
# release manifest; no such approved digest is currently published by this repository.
# Its OWN trust domain, on a host/account SEPARATE from the Portal (PD-4):
#
#   caddy        TLS-terminating reverse proxy. Gets a Let's Encrypt cert for
#                ctrl.<domain> automatically and proxies HTTPS down to the
#                coordinator's plain HTTP. The ONLY service with published ports.
#   coordinator  nil-coordinator — Privacy Pass verifier (PUBLIC key only) +
#                path selection + measurement registry. Plain HTTP on :9090,
#                reachable only on the internal net. Sees no identity/payment.
#
# Usage:
#   cp deploy/env/coordinator.env.example deploy/env/coordinator.env   # fill TODOs
#   mkdir -p deploy/coordinator && cp deploy/coordinator/registry.json.example \
#       deploy/coordinator/registry.json   # then pin the real node measurement
#   docker compose --env-file deploy/env/coordinator.env \
#       -f deploy/compose.coordinator.yaml up -d --build
#   curl -fsS https://ctrl.<domain>/healthz   # -> ok
# ===========================================================================

x-bounded-operational-logs: &bounded-operational-logs
  # Coordinator operational output is NOT assumed anonymous. Keep the local Docker log finite;
  # host backups, support tooling, and provider collection need separate retention policy.
  driver: local
  options:
    max-size: "5m"
    max-file: "2"

services:
  caddy:
    image: ${CADDY_IMAGE:?set CADDY_IMAGE to an approved immutable caddy@sha256 reference}
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 128
    mem_limit: ${CADDY_MEMORY_LIMIT:-256m}
    cpus: ${CADDY_CPU_LIMIT:-1.0}
    tmpfs:
      - /tmp:size=16m,mode=1777,noexec,nosuid,nodev
    ports:
      - "80:80"       # ACME HTTP-01 challenge + redirect to HTTPS
      - "443:443"     # public HTTPS for ctrl.<domain>
      - "443:443/udp" # HTTP/3 (QUIC)
    environment:
      - CTRL_PUBLIC_HOST=${CTRL_PUBLIC_HOST}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile.coordinator:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # persisted Let's Encrypt certs + account key
      - caddy_config:/config
    depends_on:
      - coordinator
    # HTTP access logging is absent from the Caddyfile. Discard Caddy's remaining operational
    # stdout/stderr too; a troubleshooting override is a sensitive, separately reviewed surface.
    logging:
      driver: "none"
    networks:
      coordnet:
        # Must equal the Coordinator's NW_TRUSTED_PROXY_IP.
        ipv4_address: ${NW_TRUSTED_PROXY_IP:?set the fixed Caddy IP}

  coordinator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.coordinator
    image: nil-coordinator:prod
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: ${COORDINATOR_MEMORY_LIMIT:-512m}
    cpus: ${COORDINATOR_CPU_LIMIT:-2.0}
    tmpfs:
      - /tmp:size=32m,mode=1777,noexec,nosuid,nodev
    # NO published ports: only Caddy (same internal network) reaches it.
    env_file:
      - env/coordinator.env
    environment:
      # Force the in-container bind so the proxy can reach it across the net.
      - NW_COORDINATOR_ADDR=0.0.0.0:9090
    volumes:
      # Durable permanent-nullifier/encrypted-result ledger (NW_NULLIFIER_PATH under this path).
      - coordinator_state:/var/lib/nil-coordinator
      # Node registry (NW_NODE_REGISTRY points at this in-container path). Read-only.
      # Holds only public infra facts (host, port, pinned measurement) — no secrets.
      - ./coordinator/registry.json:/etc/nil/registry.json:ro
      # Coordinator-only Ed25519 grant-signing seed. Nodes receive only its public key. Generate it
      # with `nil-coordinator grant-keygen PATH`; the command never prints the private seed. On a
      # Linux host it must be mode 0400 and owned by uid/gid 10002 so this non-root container can
      # read the bind mount without making it group/world-readable.
      - ./secrets/grant_signing_seed.hex:/etc/nil/grant_signing_seed.hex:ro
      # Independent AES-256-GCM key for the short-lived retry-result ciphertext. Every Coordinator
      # replica sharing a Postgres ledger must mount the same key. Raw 32 bytes, mode 0400, uid 10002.
      - ./secrets/redemption_result_key.bin:/etc/nil/redemption_result_key.bin:ro
    logging: *bounded-operational-logs
    networks:
      coordnet:
        ipv4_address: ${COORDINATOR_BACKEND_IP:-172.31.10.3}

volumes:
  coordinator_state:   # durable redemption ledger
  caddy_data:          # Let's Encrypt certs (durable — avoids ACME rate limits)
  caddy_config:

networks:
  coordnet:
    driver: bridge
    ipam:
      config:
        - subnet: ${COORDINATOR_NETWORK_SUBNET:-172.31.10.0/24}
