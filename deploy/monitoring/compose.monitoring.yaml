# NIL control-plane monitoring stack (blackbox). Run on an OPS host — never on a node.
#   cd deploy/monitoring && docker compose -f compose.monitoring.yaml up -d
# Probes the Portal + Coordinator /healthz (edit prometheus.yml targets) and alerts via Alertmanager
# (edit alertmanager.yml receiver). See README.md — this collects NO user data. Pin images by
# @sha256 digest before production (the tags below are placeholders, matching the repo's discipline).

services:
  prometheus:
    image: prom/prometheus:v2.54.1 # TODO pin by @sha256 digest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prom-data:/prometheus
    networks: [monitoring]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  blackbox:
    image: prom/blackbox-exporter:v0.25.0 # TODO pin by @sha256 digest
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks: [monitoring]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  alertmanager:
    image: prom/alertmanager:v0.27.0 # TODO pin by @sha256 digest
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [monitoring]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

volumes:
  prom-data:

networks:
  monitoring:
    driver: bridge
