# blackbox_exporter: probe an implemented NIL liveness URL. A 2xx = healthy. We do NOT match on
# body, so the same module works for the Portal issuer-key route and Coordinator /healthz.
modules:
  healthz_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: [200]
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      fail_if_ssl: false
      fail_if_not_ssl: true # control surfaces are TLS-only (Caddy front); a plaintext answer is a misconfig
      preferred_ip_protocol: ip4
