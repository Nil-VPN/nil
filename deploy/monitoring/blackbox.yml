# blackbox_exporter: how to probe a NIL control-surface /healthz. A 2xx = healthy. We do NOT match
# on body so the same module works for the Portal and Coordinator regardless of their /healthz body.
modules:
  healthz_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: [200]
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      fail_if_ssl: false
      fail_if_not_ssl: true # control surfaces are TLS-only (Caddy front); a plaintext answer is a misconfig
      preferred_ip_protocol: ip4
