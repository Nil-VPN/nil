# Supply-chain gate: `cargo deny check` must pass.
# Config uses cargo-deny v2 schema.

[advisories]
version = 2
# Fail on any security advisory in the dependency graph. Add IDs here only with a
# documented justification.
ignore = [
    # Marvin Attack (timing sidechannel in the `rsa` crate). It appears via TWO distinct copies,
    # so this single ID-ignore silences both — documented honestly (PD-5):
    #   1. `rsa 0.9` via `sev`/`dcap-qvl` → `nil-attest`, which only VERIFIES signatures with the
    #      AMD/Intel PUBLIC keys (no RSA private-key op), so the sidechannel does not apply there.
    #   2. `rsa 0.10.0-rc.18` via `blind-rsa-signatures` → `nil-crypto` remains in the graph for
    #      client blinding/finalization and debug issuer fixtures. Optimized nil-portal now refuses
    #      the software issuer and requires its PKCS#11 HSM backend, so the network-facing service
    #      delegates the private RSA operation to the configured device. That device/mechanism still
    #      requires independent constant-time review; this ignore is not production clearance.
    #      Exception owner: NIL security team (security@nilvpn.net).
    #      Review/expiry: 2026-10-12. Remove or renew with evidence by that date; also migrate off
    #      the pre-release RSA dependency when blind-rsa-signatures publishes a fixed stable path.
    "RUSTSEC-2023-0071",
    # quick-xml DoS advisories (RUSTSEC-2026-0194: quadratic runtime on duplicate start-tag
    # attributes; RUSTSEC-2026-0195: unbounded namespace-declaration allocation in `NsReader`).
    # `quick-xml` is pulled transitively by `plist` → the Tauri build/codegen stack, where it parses
    # our OWN trusted, bundled property lists (Info.plist / entitlements / bundle config) at BUILD
    # time — never untrusted or network-supplied XML at runtime. Both advisories require feeding
    # attacker-controlled XML to the parser, which never happens in our usage, so the DoS is not
    # reachable. `plist` (^0.39) has no fixed `quick-xml` release in range yet; revisit when the Tauri
    # stack bumps `plist`/`quick-xml`.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
# Gate "unmaintained" status on our OWN (workspace + direct) dependencies. Deep
# transitive platform bindings pulled by Tauri's Linux webview (the gtk-rs GTK3 crates,
# RUSTSEC-2024-0411..0420) are unmaintained upstream and tracked by Tauri's own GTK4
# migration — they are not first-party and are not even compiled on macOS/Windows.
unmaintained = "workspace"

[licenses]
version = 2
# Permitted licenses. Our own crates are AGPL-3.0-or-later; everything pulled from
# crates.io in Phase 0 is permissive (MIT / Apache-2.0 / BSD / ISC / CC0 / Unicode).
allow = [
    "AGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    # Mozilla root-cert data bundle (webpki-roots), pulled by reqwest's rustls TLS.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate-version debt has been reviewed (see the RUSTSEC-2023-0071 note above and the
# 2026-07-11 security audit remediation): the two `rsa` copies (0.9.10 via `sev`/`dcap-qvl`,
# 0.10.0-rc.18 via `blind-rsa-signatures`) and the Tauri/attestation transitive overlaps are
# documented and unreachable in the network-facing posture, but they are STILL PRESENT in
# Cargo.lock. Keep this at "warn" until the graph is actually deduped; escalating to "deny" now
# would break `cargo deny check` on the extant duplicates. Follow-up: remove the duplicates, then
# set this to "deny" so the graph can only shrink.
multiple-versions = "warn"
# Wildcard requirements ("*" / "x.y.*") hide major-version drift and are not allowed anywhere.
wildcards = "deny"
allow-wildcard-paths = false

[sources]
# Only crates.io is an allowed source. Any other registry or git source is denied.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Replacing crates.io with a non-registry mirror (e.g. a git source or a filesystem path) would
# silently redirect dependency resolution off the audited index. Deny any `source.replace` that does
# not resolve to the allowed crates.io registry URL so the supply chain can't be re-pointed out of band.
# No VCS organizations are allow-listed (allow-org is empty), so any org-sourced git crate is denied
# by `unknown-git = "deny"` above.
